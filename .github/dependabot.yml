version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      radix-ui:
        patterns:
          - "@radix-ui/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      leaflet:
        patterns:
          - "leaflet"
          - "react-leaflet"
          - "leaflet.markercluster"
          - "@types/leaflet"
          - "@types/leaflet.markercluster"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    labels:
      - dependencies
