<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background gradient: deep blue to teal -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f6b6b;stop-opacity:1" />
    </linearGradient>
    <!-- Pin gradient -->
    <linearGradient id="pin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60c8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter for the pin -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.4)" />
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="256" height="256" rx="40" ry="40" fill="url(#bg)" />

  <!-- Map grid lines (subtle) -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none">
    <!-- Horizontal -->
    <line x1="28" y1="80"  x2="228" y2="80" />
    <line x1="28" y1="120" x2="228" y2="120" />
    <line x1="28" y1="160" x2="228" y2="160" />
    <line x1="28" y1="200" x2="228" y2="200" />
    <!-- Vertical -->
    <line x1="68"  y1="44" x2="68"  y2="228" />
    <line x1="108" y1="44" x2="108" y2="228" />
    <line x1="148" y1="44" x2="148" y2="228" />
    <line x1="188" y1="44" x2="188" y2="228" />
  </g>

  <!-- Faint continent-like path shapes -->
  <g fill="rgba(255,255,255,0.06)" stroke="none">
    <ellipse cx="90"  cy="130" rx="38" ry="24" />
    <ellipse cx="165" cy="115" rx="28" ry="18" />
    <ellipse cx="155" cy="165" rx="20" ry="12" />
    <ellipse cx="75"  cy="175" rx="16" ry="10" />
  </g>

  <!-- Connecting dots / plotted points -->
  <g filter="url(#shadow)">
    <circle cx="88"  cy="138" r="5" fill="#22c55e" opacity="0.9" />
    <circle cx="162" cy="118" r="5" fill="#f59e0b" opacity="0.9" />
    <circle cx="148" cy="168" r="5" fill="#22c55e" opacity="0.9" />
    <!-- Lines connecting points -->
    <line x1="88" y1="138" x2="162" y2="118" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="4 3" />
    <line x1="162" y1="118" x2="148" y2="168" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="4 3" />
  </g>

  <!-- Main map pin (centre) -->
  <g filter="url(#glow)" transform="translate(128, 72)">
    <!-- Pin body -->
    <path d="M0,-52 C-22,-52 -38,-36 -38,-14 C-38,14 0,52 0,52 C0,52 38,14 38,-14 C38,-36 22,-52 0,-52 Z"
          fill="url(#pin)" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
    <!-- Pin inner circle -->
    <circle cx="0" cy="-14" r="13" fill="white" opacity="0.95" />
    <!-- Pin inner dot -->
    <circle cx="0" cy="-14" r="5" fill="#2563eb" />
  </g>

  <!-- App name -->
  <text x="128" y="210"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="22"
        font-weight="700"
        fill="white"
        text-anchor="middle"
        letter-spacing="1"
        opacity="0.95">MapPlotter</text>
</svg>
